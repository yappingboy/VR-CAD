name: Export and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/vr-cad-quest-app-kXHdR
  workflow_dispatch:

# Allow only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Export (runs on every push) ─────────────────────────────────────────────
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot 4.6.1
        run: |
          GODOT_VERSION="4.6.1"
          GODOT_RELEASE="stable"
          FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${FILENAME}.zip" \
               -O godot.zip
          unzip -q godot.zip
          sudo mv "${FILENAME}" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Godot export templates
        run: |
          GODOT_VERSION="4.6.1"
          GODOT_RELEASE="stable"
          TEMPLATES_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          mkdir -p "${TEMPLATES_DIR}"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz" \
               -O templates.tpz
          unzip -q templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "${TEMPLATES_DIR}/"

      - name: Export project to Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      # GitHub Pages doesn't send COOP/COEP headers; this service worker patches
      # that so SharedArrayBuffer (needed by Godot threads) works.
      - name: Add COI service worker
        run: |
          curl -sL "https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js" \
               -o build/web/coi-serviceworker.js
          sed -i 's|</head>|  <script src="coi-serviceworker.js"></script>\n  </head>|' build/web/index.html

      # ── Stamp build badge into loading page ────────────────────────────────
      - name: Inject build badge
        run: |
          export BUILD_NUM=$(git rev-list --count HEAD)
          export GIT_SHA=$(git rev-parse --short HEAD)
          export BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          python3 - <<'PYEOF'
import os
build_num  = os.environ['BUILD_NUM']
git_sha    = os.environ['GIT_SHA']
build_date = os.environ['BUILD_DATE']
css = (
    '<style>'
    '#build-badge{'
    'position:fixed;bottom:8px;right:10px;z-index:9999;'
    'font-family:monospace;font-size:11px;'
    'color:rgba(255,255,255,.55);background:rgba(0,0,0,.45);'
    'padding:3px 7px;border-radius:4px;'
    'pointer-events:none;letter-spacing:.03em;'
    '}'
    '</style>'
)
html = f'<div id="build-badge">#{build_num} &nbsp;{git_sha} &nbsp;{build_date}</div>'
path = 'build/web/index.html'
text = open(path).read()
text = text.replace('</head>', css + '</head>', 1)
text = text.replace('</body>', html + '</body>', 1)
open(path, 'w').write(text)
PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # ── Deploy (main branch only) ───────────────────────────────────────────────
  deploy:
    needs: export
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
